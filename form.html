<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simple form</title>
  <link rel="stylesheet" href="assets/css/formstyle.css"> 
</head>
<body>
    <h2>a simple form</h2>
    <form>
        <label for="fname"> fullname:</label>
        <input type="text" id="fname" name="fname" required placeholder="enter your full name"><br>
        <label for="email"> email:</label>
        <input type="email" name="email" id="email" required placeholder="enter your email"><br>
        <label for="phone"> phone number:</label>
        <input type="number" name="phone" id="number" required placeholder="enter your number"><br>
        <label for="message"> message</label><br>
        <textarea id="message" rows="4"placeholder=enter your message></textarea><br>
    <button type="submit">send message</button>

    </form>
    
</body>
</html>
